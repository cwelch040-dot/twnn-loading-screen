<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TWNN Loading Screen</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="bg"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="particles" id="particles"></div>

    <main class="content">
        <section class="server-card">
            <div class="tag">TTT2 COMMUNITY SERVER</div>
            <h1 class="glitch" data-text="TWNN">TWNN</h1>
            <h2>TEAM WITH NO NAME</h2>

            <div class="status" id="statusText">CONNECTING TO SERVER</div>

            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="percent" id="percentText">0%</div>
        </section>

        <section class="tips">
            <div class="tip-title">SERVER TIP</div>
            <div id="tipText">Earn XP from kills, wins, body IDs and events.</div>
        </section>
    </main>

    <footer>
        <div>discord.gg/FTB9c9AmDX</div>
        <div>Custom Leveling • Prestige • XP Events</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
